<svg width="850" height="200" viewBox="-50 0 850 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* ============ ANIMATIONS (8s shared cycle) ============ */

      /* Revert to the proven timing from the live version.
         Same jump keyframes, but on a 4s cycle (half of 8s)
         so the dino jumps 4x per 8s instead of 2x. */
      @keyframes jump {
        0%, 18% { transform: translateY(0); }
        23% { transform: translateY(-55px); }
        28% { transform: translateY(-55px); }
        35% { transform: translateY(0); }
        50%, 68% { transform: translateY(0); }
        73% { transform: translateY(-55px); }
        78% { transform: translateY(-55px); }
        85% { transform: translateY(0); }
        100% { transform: translateY(0); }
      }

      /* Obstacle group 1: scroll right to left */
      @keyframes scroll1 {
        0% { transform: translateX(700px); }
        100% { transform: translateX(-200px); }
      }

      /* Obstacle group 2: same but offset start */
      @keyframes scroll2 {
        0% { transform: translateX(700px); }
        100% { transform: translateX(-200px); }
      }

      /* Ground dashes scrolling */
      @keyframes groundScroll {
        0% { transform: translateX(0); }
        100% { transform: translateX(-40px); }
      }

      /* Scanline sweep */
      @keyframes scanline {
        0% { transform: translateY(-200px); }
        100% { transform: translateY(200px); }
      }

      /* Dino eye blink */
      @keyframes blink {
        0%, 90%, 100% { opacity: 1; }
        95% { opacity: 0; }
      }

      /* Terminal cursor blink */
      @keyframes cursorBlink {
        0%, 49% { opacity: 0.6; }
        50%, 100% { opacity: 0; }
      }

      /* Score cycling: show each digit for 1/5 of the 8s cycle */
      @keyframes score1 {
        0%, 19.9%   { opacity: 1; }
        20%, 100%   { opacity: 0; }
      }
      @keyframes score2 {
        0%, 19.9%   { opacity: 0; }
        20%, 39.9%  { opacity: 1; }
        40%, 100%   { opacity: 0; }
      }
      @keyframes score3 {
        0%, 39.9%   { opacity: 0; }
        40%, 59.9%  { opacity: 1; }
        60%, 100%   { opacity: 0; }
      }
      @keyframes score4 {
        0%, 59.9%   { opacity: 0; }
        60%, 79.9%  { opacity: 1; }
        80%, 100%   { opacity: 0; }
      }
      @keyframes score5 {
        0%, 79.9%   { opacity: 0; }
        80%, 100%   { opacity: 1; }
      }

      .dino { animation: jump 4s ease-in-out infinite; }
      .obs1 { animation: scroll1 4s linear infinite; }
      .obs2 { animation: scroll2 4s linear infinite; animation-delay: -2s; }
      .ground-marks { animation: groundScroll 0.5s linear infinite; }
      .scan { animation: scanline 4s linear infinite; }
      .eye { animation: blink 8s step-end infinite; }
      .cursor { animation: cursorBlink 1.2s step-end infinite; }
      .s1 { animation: score1 8s step-end infinite; }
      .s2 { animation: score2 8s step-end infinite; }
      .s3 { animation: score3 8s step-end infinite; }
      .s4 { animation: score4 8s step-end infinite; }
      .s5 { animation: score5 8s step-end infinite; }
    </style>

    <!-- Scanline pattern for CRT effect -->
    <pattern id="scanlines" width="800" height="4" patternUnits="userSpaceOnUse">
      <rect width="800" height="2" fill="transparent"/>
      <rect y="2" width="800" height="2" fill="#00ff41" opacity="0.03"/>
    </pattern>
  </defs>

  <!-- ============ BACKGROUND ============ -->
  <rect x="-50" width="850" height="200" fill="#0a0a0a"/>
  <rect x="-50" width="850" height="200" fill="url(#scanlines)"/>

  <!-- Scanline sweep bar -->
  <rect x="-50" width="850" height="3" fill="#00ff41" opacity="0.04" class="scan"/>

  <!-- ============ GROUND ============ -->
  <line x1="-50" y1="160" x2="800" y2="160" stroke="#00ff41" stroke-width="1.5" opacity="0.8"/>

  <!-- Scrolling ground texture marks -->
  <g class="ground-marks" opacity="0.4">
    <line x1="20"  y1="163" x2="28"  y2="163" stroke="#00ff41" stroke-width="1"/>
    <line x1="60"  y1="165" x2="65"  y2="165" stroke="#00ff41" stroke-width="1"/>
    <line x1="100" y1="163" x2="110" y2="163" stroke="#00ff41" stroke-width="1"/>
    <line x1="150" y1="164" x2="155" y2="164" stroke="#00ff41" stroke-width="1"/>
    <line x1="200" y1="163" x2="212" y2="163" stroke="#00ff41" stroke-width="1"/>
    <line x1="260" y1="165" x2="266" y2="165" stroke="#00ff41" stroke-width="1"/>
    <line x1="310" y1="163" x2="318" y2="163" stroke="#00ff41" stroke-width="1"/>
    <line x1="370" y1="164" x2="375" y2="164" stroke="#00ff41" stroke-width="1"/>
    <line x1="420" y1="163" x2="430" y2="163" stroke="#00ff41" stroke-width="1"/>
    <line x1="480" y1="165" x2="486" y2="165" stroke="#00ff41" stroke-width="1"/>
    <line x1="530" y1="163" x2="540" y2="163" stroke="#00ff41" stroke-width="1"/>
    <line x1="590" y1="164" x2="596" y2="164" stroke="#00ff41" stroke-width="1"/>
    <line x1="640" y1="163" x2="650" y2="163" stroke="#00ff41" stroke-width="1"/>
    <line x1="700" y1="165" x2="707" y2="165" stroke="#00ff41" stroke-width="1"/>
    <line x1="750" y1="163" x2="760" y2="163" stroke="#00ff41" stroke-width="1"/>
    <line x1="790" y1="164" x2="798" y2="164" stroke="#00ff41" stroke-width="1"/>
    <!-- Duplicate set for seamless scroll -->
    <line x1="820" y1="163" x2="828" y2="163" stroke="#00ff41" stroke-width="1"/>
    <line x1="840" y1="165" x2="845" y2="165" stroke="#00ff41" stroke-width="1"/>
  </g>

  <!-- ============ DINOSAUR (pixel art, 6px grid, smaller) ============ -->
  <g class="dino" transform="translate(150, 0)">
    <!-- Body -->
    <rect x="0"  y="126" width="6" height="6" fill="#00ff41"/>
    <rect x="6"  y="126" width="6" height="6" fill="#00ff41"/>
    <rect x="12" y="126" width="6" height="6" fill="#00ff41"/>

    <rect x="-6" y="120" width="6" height="6" fill="#00ff41"/>
    <rect x="0"  y="120" width="6" height="6" fill="#00ff41"/>
    <rect x="6"  y="120" width="6" height="6" fill="#00ff41"/>
    <rect x="12" y="120" width="6" height="6" fill="#00ff41"/>
    <rect x="18" y="120" width="6" height="6" fill="#00ff41"/>

    <rect x="-6" y="114" width="6" height="6" fill="#00ff41"/>
    <rect x="0"  y="114" width="6" height="6" fill="#00ff41"/>
    <rect x="6"  y="114" width="6" height="6" fill="#00ff41"/>
    <rect x="12" y="114" width="6" height="6" fill="#00ff41"/>

    <rect x="0"  y="108" width="6" height="6" fill="#00ff41"/>
    <rect x="6"  y="108" width="6" height="6" fill="#00ff41"/>
    <rect x="12" y="108" width="6" height="6" fill="#00ff41"/>
    <rect x="18" y="108" width="6" height="6" fill="#00cc33"/>

    <!-- Neck + head -->
    <rect x="6"  y="102" width="6" height="6" fill="#00ff41"/>
    <rect x="12" y="102" width="6" height="6" fill="#00ff41"/>

    <rect x="6"  y="96" width="6" height="6" fill="#00ff41"/>
    <rect x="12" y="96" width="6" height="6" fill="#00ff41"/>
    <rect x="18" y="96" width="6" height="6" fill="#00ff41"/>
    <rect x="24" y="96" width="6" height="6" fill="#00ff41"/>

    <rect x="6"  y="90" width="6" height="6" fill="#00ff41"/>
    <rect x="12" y="90" width="6" height="6" fill="#00ff41"/>
    <rect x="18" y="90" width="6" height="6" fill="#00ff41"/>
    <rect x="24" y="90" width="6" height="6" fill="#00ff41"/>

    <!-- Top of head -->
    <rect x="12" y="84" width="6" height="6" fill="#00ff41"/>
    <rect x="18" y="84" width="6" height="6" fill="#00ff41"/>
    <rect x="24" y="84" width="6" height="6" fill="#00ff41"/>

    <!-- Eye (dark pixel) -->
    <rect x="21" y="90" width="5" height="5" fill="#0a0a0a" class="eye"/>

    <!-- Arm -->
    <rect x="18" y="114" width="6" height="3" fill="#00cc33"/>
    <rect x="24" y="114" width="3" height="3" fill="#00cc33"/>

    <!-- Tail -->
    <rect x="-12" y="120" width="6" height="6" fill="#00ff41"/>
    <rect x="-18" y="114" width="6" height="6" fill="#00ff41"/>
    <rect x="-24" y="108" width="6" height="6" fill="#00ff41"/>

    <!-- Legs -->
    <rect x="0"  y="132" width="6" height="12" fill="#00ff41"/>
    <rect x="0"  y="144" width="6" height="6"  fill="#00ff41"/>
    <rect x="6"  y="150" width="6" height="6"  fill="#00ff41"/>

    <rect x="12" y="132" width="6" height="12" fill="#00ff41"/>
    <rect x="12" y="144" width="6" height="6"  fill="#00ff41"/>
    <rect x="18" y="150" width="6" height="6"  fill="#00ff41"/>
  </g>

  <!-- ============ OBSTACLES ============ -->

  <!-- Obstacle group 1: curly braces -->
  <g class="obs1">
    <text x="0" y="155" font-family="monospace" font-size="36" font-weight="bold" fill="#00ff41" opacity="0.9">{</text>
    <text x="30" y="155" font-family="monospace" font-size="36" font-weight="bold" fill="#00ff41" opacity="0.9">}</text>
  </g>

  <!-- Obstacle group 2: angle brackets / closing tag -->
  <g class="obs2">
    <text x="0" y="150" font-family="monospace" font-size="28" font-weight="bold" fill="#00ff41" opacity="0.9">&lt;/&gt;</text>
  </g>

  <!-- ============ SCORE (animated counting up) ============ -->
  <!-- High score with infinity symbol -->
  <text x="640" y="30" font-family="monospace" font-size="14" fill="#00ff41" opacity="0.7">HI</text>
  <text x="662" y="32" font-family="monospace" font-size="22" fill="#00ff41" opacity="0.7">&#x221E;</text>

  <!-- Current score cycles through values -->
  <text x="700" y="30" font-family="monospace" font-size="14" fill="#00ff41" class="s1">00032</text>
  <text x="700" y="30" font-family="monospace" font-size="14" fill="#00ff41" class="s2">00087</text>
  <text x="700" y="30" font-family="monospace" font-size="14" fill="#00ff41" class="s3">00143</text>
  <text x="700" y="30" font-family="monospace" font-size="14" fill="#00ff41" class="s4">00219</text>
  <text x="700" y="30" font-family="monospace" font-size="14" fill="#00ff41" class="s5">00304</text>

  <!-- ============ DECORATIVE STARS ============ -->
  <circle cx="300" cy="40" r="1" fill="#00ff41" opacity="0.3"/>
  <circle cx="450" cy="25" r="1.5" fill="#00ff41" opacity="0.2"/>
  <circle cx="550" cy="55" r="1" fill="#00ff41" opacity="0.25"/>
  <circle cx="380" cy="70" r="1" fill="#00ff41" opacity="0.15"/>
  <circle cx="620" cy="35" r="1.2" fill="#00ff41" opacity="0.2"/>
  <circle cx="250" cy="60" r="1" fill="#00ff41" opacity="0.2"/>

  <!-- Terminal cursor blinking effect in corner -->
  <rect x="15" y="15" width="8" height="14" fill="#00ff41" class="cursor"/>
  <text x="28" y="27" font-family="monospace" font-size="12" fill="#00ff41" opacity="0.4">~/brownjer3</text>
</svg>
